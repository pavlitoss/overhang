<button
    hx-post="{% url 'catalog:toggle_active' entity.slug %}"
    hx-target="#active-{{ entity.slug }}"
    hx-swap="innerHTML"
    class="text-xs font-medium px-2.5 py-1 rounded-full transition-colors
        {% if entity.is_active %}bg-green-900/50 text-green-400 border border-green-800 hover:bg-green-900/80
        {% else %}bg-zinc-800 text-zinc-500 border border-zinc-700 hover:bg-zinc-700{% endif %}">
    {% if entity.is_active %}Active{% else %}Inactive{% endif %}
</button>
